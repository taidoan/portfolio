name: CI/CD Pipeline

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  pull_request_target:
    branches: [develop, main]
    types: [closed]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Run Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Run lint
        run: npm run lint
        env:
          NEXT_PUBLIC_URL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_URL_ENDPOINT }}

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run tests
        run: npm run test
        env:
          NEXT_PUBLIC_URL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_URL_ENDPOINT }}

  generate-docs:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    name: Generate Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code with token
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if docs should be generated
        id: check-docs
        run: |
          # Get the base and head commit SHAs
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Checking changes between $BASE_SHA and $HEAD_SHA"

          # Check if any relevant files changed
          if git diff --name-only $BASE_SHA..$HEAD_SHA | grep -E '\.(js|ts|jsx|tsx|md|css|scss)$'; then
            echo "Found relevant file changes, will generate docs"
            echo "should-generate=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant file changes found, skipping docs generation"
            echo "should-generate=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js with caching
        if: steps.check-docs.outputs.should-generate == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-docs.outputs.should-generate == 'true'
        run: npm ci

      - name: Generate documentation
        if: steps.check-docs.outputs.should-generate == 'true'
        run: npm run docs
        env:
          NEXT_PUBLIC_URL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_URL_ENDPOINT }}

      - name: Check for documentation changes
        if: steps.check-docs.outputs.should-generate == 'true'
        id: verify-changed-files
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push documentation
        if: steps.check-docs.outputs.should-generate == 'true' && steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          export HUSKY=0

          git add .
          git commit -m "[skip-deploy] docs: update documentation"
          git push

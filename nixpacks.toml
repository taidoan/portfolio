[variables]
# Build optimizations
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_AUDIT = "false"
NPM_CONFIG_UPDATE_NOTIFIER = "false"
CI = "true"

# Node options for your build (matching your scripts)
NODE_OPTIONS = "--no-deprecation --max-old-space-size=4096"
NODE_NO_WARNINGS = "1"

[phases.setup]
# Use Node 22 LTS with latest npm
# Minimal libraries for smaller image
nixLibs = ["gcc-unwrapped", "libuuid"]
# Remove unnecessary packages
aptPkgs = ["curl"]

[phases.install] 
dependsOn = ["setup"]
# Optimized npm install matching your needs
cmds = [
  "npm ci --prefer-offline --no-audit --no-fund --legacy-peer-deps --omit=dev",
  "npm rebuild sharp --platform=linux --arch=x64"
]
cacheDirectories = ["/root/.npm", "node_modules/.cache"]
paths = ["/app/node_modules/.bin"]

[phases.build]
dependsOn = ["install"]
# Use your existing build process (build + postbuild)
cmds = [
  "npm run build",
  "npm run postbuild"
]
cacheDirectories = [".next/cache", "node_modules/.cache"]

[start]
cmd = "npm run start"
